spring:
  cloud:
    gateway:
      routes:
        - id: auth
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: product
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**
        - id: order
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**
        - id: payment
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**
        - id: user
          uri: http://user-service:8085
          predicates:
            - Path=/api/users/**
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
