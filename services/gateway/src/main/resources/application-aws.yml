spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins:
              - "${FRONTEND_ORIGIN}"
            allowed-methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowed-headers:
              - "*"
            exposed-headers:
              - "Set-Cookie"
              - "X-Trace-Id"
            allow-credentials: true
            max-age: 3600
      routes:
        - id: auth-login
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/login
          filters:
            - name: JsonRateLimiter
              args:
                key-resolver-bean: clientIpKeyResolver
                replenish-rate: 1
                burst-capacity: 5
        - id: auth-refresh
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/refresh
          filters:
            - name: JsonRateLimiter
              args:
                key-resolver-bean: clientIpKeyResolver
                replenish-rate: 2
                burst-capacity: 10
        - id: auth
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: product
          uri: http://product-service:8082
          predicates:
            - Path=/api/products/**
        - id: order-pay
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/*/pay
          filters:
            - name: JsonRateLimiter
              args:
                key-resolver-bean: authenticatedUserKeyResolver
                replenish-rate: 1
                burst-capacity: 3
        - id: order
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**
        - id: payment
          uri: http://payment-service:8084
          predicates:
            - Path=/api/payments/**
        - id: user
          uri: http://user-service:8085
          predicates:
            - Path=/api/users/**
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
