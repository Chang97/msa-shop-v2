server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: auth-login
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/login
          filters:
            - name: JsonRateLimiter
              args:
                key-resolver-bean: clientIpKeyResolver
                replenish-rate: 1
                burst-capacity: 5
        - id: auth-refresh
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/refresh
          filters:
            - name: JsonRateLimiter
              args:
                key-resolver-bean: clientIpKeyResolver
                replenish-rate: 2
                burst-capacity: 10
        - id: auth
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
        - id: product
          uri: ${PRODUCT_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/products/**
        - id: order-pay
          uri: ${ORDER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/orders/*/pay
          filters:
            - name: JsonRateLimiter
              args:
                key-resolver-bean: authenticatedUserKeyResolver
                replenish-rate: 1
                burst-capacity: 3
        - id: order
          uri: ${ORDER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
        - id: payment
          uri: ${PAYMENT_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/payments/**
        - id: user
          uri: ${USER_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/users/**
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/jwt-public.pem
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [traceId=%X{traceId}] - %msg%n"
