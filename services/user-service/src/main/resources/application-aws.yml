clients:
  auth-service:
    base-url: http://auth-service:8081

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT:localhost}:5432/user_db
    username: ${RDS_USERNAME:user_user}
    password: ${RDS_PASSWORD:user_pw}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

app:
  kafka:
    producer:
      batch-size: 20
      fixed-delay-ms: 1000
