server:
  port: 8085

clients:
  auth-service:
    base-url: http://localhost:8081
spring:
  debug: true
  application:
    name: user-service
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: user-service-auth-user-saga
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/user_db
    username: user_user
    password: user_pw
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  data:
    redis:
      host: localhost
      port: 16379

  jpa:
    hibernate:
      ddl-auto: none

# (??) ?? ?? ??? ? ?? prefix? ?? ????
app:
  cache:
    user:
      ttl-seconds: 300
      key-prefix: user:detail
  kafka:
    topics:
      auth-user-saga: auth.user.saga.v1
      auth-user-saga-dlq: auth.user.saga.v1.dlq
    consumers:
      auth-user-saga-enabled: true
      worker-id: ${HOSTNAME:user-service}
      claim-timeout-seconds: 300
    producer:
      relay-enabled: true
      batch-size: 100
      fixed-delay-ms: 3000
      worker-id: ${HOSTNAME:user-service}
      claim-timeout-seconds: 300
      max-retry-count: 5
      retry-delay-seconds: 30

# JWT ?? ??? ?? ? ? ?? ??
security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me}  # (??? ??? ?? ???? ??)
  internal:
    header-name: X-Internal-Secret
    service-secret: local-internal-secret

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.web.server.adapter.HttpWebHandlerAdapter: DEBUG
