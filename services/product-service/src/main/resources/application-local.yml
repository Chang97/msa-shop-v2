server:
  port: 8082

spring:
  debug: true
  application:
    name: product-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: product-service-order-payment-saga
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${PRODUCT_DB_URL:jdbc:postgresql://localhost:15432/product_db}
    username: product_user
    password: product_pw
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:16379}

  jpa:
    hibernate:
      ddl-auto: none

# (??) ?? ?? ??? ? ?? prefix? ?? ????
app:
  cache:
    product:
      ttl-seconds: 300
      key-prefix: product:detail
  kafka:
    topics:
      order-payment-saga: order.payment.saga.v1
      order-payment-saga-dlq: order.payment.saga.v1.dlq
    consumers:
      order-payment-saga-enabled: false
      worker-id: ${HOSTNAME:product-service}
      claim-timeout-seconds: 300
    producer:
      relay-enabled: false
      batch-size: 100
      fixed-delay-ms: 3000
      worker-id: ${HOSTNAME:product-service}
      claim-timeout-seconds: 300
      max-retry-count: 5
      retry-delay-seconds: 30

# JWT ?? ??? ?? ? ? ?? ??
security:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me}  # (??? ??? ?? ???? ??)
  internal:
    header-name: X-Internal-Secret
    service-secret: ${INTERNAL_SERVICE_SECRET:local-internal-secret}

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.security: DEBUG
