spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT:localhost}:5432/payment_db
    username: ${RDS_USERNAME:payment_user}
    password: ${RDS_PASSWORD:payment_pw}

clients:
  order:
    base-url: http://order-service:8083

app:
  kafka:
    consumers:
      order-payment-saga-enabled: true
    producer:
      relay-enabled: true
      batch-size: 20
      fixed-delay-ms: 1000
