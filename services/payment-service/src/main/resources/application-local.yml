server:
  port: 8084

spring:
  application:
    name: payment-service
  kafka:
    bootstrap-servers: localhost:19092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: payment-service-order-payment-saga
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/payment_db
    username: payment_user
    password: payment_pw

  data:
    redis:
      host: localhost
      port: 16379

  jpa:
    hibernate:
      ddl-auto: none

clients:
  order:
    base-url: ${ORDER_BASE_URL:http://localhost:8083}

app:
  payment:
    reconciliation:
      enabled: false
      batch-size: 20
      fixed-delay-ms: 5000
  idempotency:
    ttl-seconds: 600
    key-prefix: payment:idempotency
  kafka:
    topics:
      order-payment-saga: order.payment.saga.v1
      order-payment-saga-dlq: order.payment.saga.v1.dlq
    consumers:
      order-payment-saga-enabled: false
      worker-id: ${HOSTNAME:payment-service}
      claim-timeout-seconds: 300
    producer:
      relay-enabled: false
      batch-size: 100
      fixed-delay-ms: 3000
      worker-id: ${HOSTNAME:payment-service}
      claim-timeout-seconds: 300
      max-retry-count: 5
      retry-delay-seconds: 30

security:
  internal:
    header-name: X-Internal-Secret
    service-secret: ${INTERNAL_SERVICE_SECRET:local-internal-secret}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-me}
