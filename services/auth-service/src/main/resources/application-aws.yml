server:
  port: 8081

clients:
  user-service:
    base-url: http://user-service:8085

spring:
  application:
    name: auth-service
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration, classpath:db/seed/local
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      group-id: auth-service-auth-user-saga
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${RDS_ENDPOINT:localhost}:5432/auth_db
    username: ${RDS_USERNAME:auth_user}
    password: ${RDS_PASSWORD:auth_pw}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
  jpa:
    hibernate:
      ddl-auto: none

decorator:
  datasource:
    p6spy:
      enabled: false

app:
  auth:
    cookie:
      secure: false
      same-site: Lax
      path: /api/auth
    refresh-token:
      ttl-seconds: 604800
      key-prefix: auth:refresh_token
    authority:
      cache-ttl-seconds: 600
      key-prefix: auth:perm
  kafka:
    topics:
      auth-user-saga: auth.user.saga.v1
      auth-user-saga-dlq: auth.user.saga.v1.dlq
    consumers:
      auth-user-saga-enabled: true
      worker-id: ${HOSTNAME:auth-service}
      claim-timeout-seconds: 300
    producer:
      relay-enabled: true
      batch-size: 20
      fixed-delay-ms: 1000
      worker-id: ${HOSTNAME:auth-service}
      claim-timeout-seconds: 300
      max-retry-count: 5
      retry-delay-seconds: 30
  permission:
    cache:
      ttl-seconds: 600
      key-prefix: app:permission

security:
  internal:
    header-name: X-Internal-Secret
    service-secret: ${INTERNAL_SERVICE_SECRET:local-internal-secret}
  service-accounts:
    accounts:
      - client-id: order-service
        client-secret: ${ORDER_SERVICE_CLIENT_SECRET:local-order-service-secret}
        permissions:
          - PRODUCT_UPDATE
  jwt:
    issuer: auth-service
    access-token-ttl-seconds: 1800
    private-key-location: classpath:keys/jwt-private.pem
    public-key-location: classpath:keys/jwt-public.pem

