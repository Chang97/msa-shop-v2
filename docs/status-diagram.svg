<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">주문 상태 전이 - 단순화 버전</title>
  <desc id="desc">메인 흐름, 예외 흐름, 종료 흐름을 분리해 현재 order-service 상태 전이를 표현한 다이어그램</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .panel { fill: #ffffff; stroke: #d9e1ef; stroke-width: 1.5; rx: 28; ry: 28; }
      .title { font: 700 34px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #17253d; }
      .subtitle { font: 500 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #5a6982; }
      .section { font: 700 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #44546d; }
      .stateTitle { font: 700 24px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #15304f; }
      .stateDesc { font: 500 15px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #65758f; }
      .chipTextMain { font: 700 13px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #5472a3; }
      .chipTextSub { font: 700 13px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #7e8ea8; }
      .chipTextLate { font: 700 13px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #9b6a32; }
      .chipTextCancel { font: 700 13px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #b45b5b; }
      .lineMain { stroke: #5472a3; stroke-width: 4; fill: none; marker-end: url(#arrowMain); }
      .lineSub { stroke: #7e8ea8; stroke-width: 3.2; fill: none; marker-end: url(#arrowSub); }
      .lineLate { stroke: #9b6a32; stroke-width: 3.2; fill: none; stroke-dasharray: 10 8; marker-end: url(#arrowLate); }
      .lineCancel { stroke: #b45b5b; stroke-width: 3.2; fill: none; marker-end: url(#arrowCancel); }
      .card { fill: #ffffff; stroke-width: 2.5; rx: 22; ry: 22; }
      .card-main { stroke: #5472a3; }
      .card-success { fill: #eef8ef; stroke: #5f9b69; }
      .card-warn { fill: #fff7ec; stroke: #ca8a2d; }
      .card-end { fill: #f8f1f1; stroke: #b45b5b; }
      .legendDotMain { fill: #5472a3; }
      .legendDotWarn { fill: #ca8a2d; }
      .legendDotCancel { fill: #b45b5b; }
    </style>
    <marker id="arrowMain" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5472a3"/>
    </marker>
    <marker id="arrowSub" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7e8ea8"/>
    </marker>
    <marker id="arrowLate" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9b6a32"/>
    </marker>
    <marker id="arrowCancel" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#b45b5b"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <rect class="panel" x="40" y="34" width="1520" height="912"/>

  <text x="88" y="92" class="title">주문 상태 전이</text>
  <text x="88" y="125" class="subtitle">메인 흐름, 예외 흐름, 종료 상태를 분리해 현재 order-service 구현 기준만 표시했다.</text>

  <circle cx="94" cy="168" r="8" class="legendDotMain"/>
  <text x="110" y="173" class="section">메인 흐름</text>
  <circle cx="240" cy="168" r="7" class="legendDotWarn"/>
  <text x="256" y="173" class="section">실패 / 만료 / 재결제</text>
  <circle cx="470" cy="168" r="7" class="legendDotCancel"/>
  <text x="486" y="173" class="section">취소 / 종료</text>

  <text x="117" y="232" class="section">1. 정상 승인 흐름</text>
  <text x="117" y="496" class="section">2. 실패 / 만료 / 늦게 도착한 결과</text>
  <text x="117" y="806" class="section">3. 종료 상태</text>

  <rect x="140" y="270" width="260" height="116" class="card card-main"/>
  <text x="270" y="320" text-anchor="middle" class="stateTitle">CREATED</text>
  <text x="270" y="350" text-anchor="middle" class="stateDesc">주문 생성 완료</text>

  <rect x="540" y="270" width="320" height="116" class="card card-main"/>
  <text x="700" y="320" text-anchor="middle" class="stateTitle">PENDING_PAYMENT</text>
  <text x="700" y="350" text-anchor="middle" class="stateDesc">결제 진행 중 / Saga 처리 중</text>

  <rect x="1000" y="270" width="260" height="116" class="card card-success"/>
  <text x="1130" y="320" text-anchor="middle" class="stateTitle">PAID</text>
  <text x="1130" y="350" text-anchor="middle" class="stateDesc">결제 승인 완료</text>

  <path class="lineMain" d="M400 328 H540"/>
  <text x="490" y="305" text-anchor="middle" class="chipTextMain">결제 시작</text>

  <path class="lineMain" d="M860 328 H1000"/>
  <text x="948" y="305" text-anchor="middle" class="chipTextMain">승인 완료</text>

  <rect x="430" y="550" width="280" height="116" class="card card-warn"/>
  <text x="570" y="600" text-anchor="middle" class="stateTitle">PAYMENT_FAILED</text>
  <text x="570" y="630" text-anchor="middle" class="stateDesc">결제 실패 확정</text>

  <rect x="860" y="550" width="300" height="116" class="card card-warn"/>
  <text x="1010" y="600" text-anchor="middle" class="stateTitle">PAYMENT_EXPIRED</text>
  <text x="1010" y="630" text-anchor="middle" class="stateDesc">장시간 미결제로 만료</text>

  <path class="lineSub" d="M640 386 V468 H540 V550"/>
  <text x="570" y="461" text-anchor="middle" class="chipTextSub">결제 실패 / 재고 실패</text>

  <path class="lineSub" d="M780 386 V468 H1050 V550"/>
  <text x="1010" y="461" text-anchor="middle" class="chipTextSub">만료 스케줄러</text>

  <path class="lineSub" d="M600 550 V500 H690 V386"/>
  <text x="640" y="493" text-anchor="middle" class="chipTextSub">재결제</text>

  <path class="lineSub" d="M1010 550 V500 H760 V386"/>
  <text x="886" y="493" text-anchor="middle" class="chipTextSub">재결제</text>

  <path class="lineLate" d="M1160 608 H1300 V328 H1260"/>
  <text x="1364" y="463" text-anchor="middle" class="chipTextLate">늦게 도착한 승인</text>

  <path class="lineLate" d="M860 608 H780 V608 H710"/>
  <text x="804" y="585" text-anchor="middle" class="chipTextLate">늦게 도착한 실패</text>

  <rect x="610" y="820" width="340" height="116" class="card card-end"/>
  <text x="780" y="870" text-anchor="middle" class="stateTitle">CANCELLED</text>
  <text x="780" y="900" text-anchor="middle" class="stateDesc">주문 취소 완료</text>

  <path class="lineCancel" d="M270 386 V770 H700 V820"/>
  <text x="352" y="751" text-anchor="middle" class="chipTextCancel">취소</text>

  <path class="lineCancel" d="M570 666 V752 H748 V820"/>
  <text x="642" y="741" text-anchor="middle" class="chipTextCancel">취소</text>

  <path class="lineCancel" d="M1010 666 V752 H812 V820"/>
  <text x="962" y="741" text-anchor="middle" class="chipTextCancel">취소</text>
</svg>
