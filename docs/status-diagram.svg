<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">주문 상태 다이어그램</title>
  <desc id="desc">주문 aggregate의 상태 전이 CREATED, PENDING_PAYMENT, PAID, CANCELLED를 나타내는 다이어그램</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fc; }
      .box { fill: #ffffff; stroke: #2c4f7c; stroke-width: 3; rx: 24; ry: 24; }
      .boxEnd { fill: #eef8ef; stroke: #4f8a5b; stroke-width: 3; rx: 24; ry: 24; }
      .title { font: 700 30px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #162033; }
      .note { font: 500 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #43506a; }
      .state { font: 700 24px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #173256; }
      .label { font: 500 16px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #51627d; }
      .arrow { stroke: #52627a; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .arrowCancel { stroke: #9b4f4f; stroke-width: 3.5; fill: none; marker-end: url(#arrowCancel); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#52627a" />
    </marker>
    <marker id="arrowCancel" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9b4f4f" />
    </marker>
  </defs>

  <rect class="bg" width="1400" height="560" />
  <text x="56" y="60" class="title">주문 상태 전이</text>
  <text x="56" y="95" class="note">결제 실패와 재고 예약 실패는 별도 주문 상태로 전이하지 않고 PENDING_PAYMENT를 유지한 채 history만 기록한다.</text>

  <rect x="80" y="210" width="220" height="110" class="box" />
  <text x="190" y="258" text-anchor="middle" class="state">CREATED</text>
  <text x="190" y="288" text-anchor="middle" class="label">주문 생성 완료</text>

  <rect x="420" y="210" width="320" height="110" class="box" />
  <text x="580" y="258" text-anchor="middle" class="state">PENDING_PAYMENT</text>
  <text x="580" y="288" text-anchor="middle" class="label">결제 시작, Saga 진행 중</text>

  <rect x="980" y="210" width="220" height="110" class="boxEnd" />
  <text x="1090" y="258" text-anchor="middle" class="state">PAID</text>
  <text x="1090" y="288" text-anchor="middle" class="label">결제 승인 완료</text>

  <rect x="420" y="390" width="320" height="110" class="boxEnd" />
  <text x="580" y="438" text-anchor="middle" class="state">CANCELLED</text>
  <text x="580" y="468" text-anchor="middle" class="label">주문 취소 완료</text>

  <path class="arrow" d="M300 265 L420 265" />
  <text x="360" y="244" text-anchor="middle" class="label">payOrder()</text>

  <path class="arrow" d="M740 265 L980 265" />
  <text x="860" y="240" text-anchor="middle" class="label">PaymentApproved</text>

  <path class="arrowCancel" d="M190 320 L190 360 L500 360 L500 390" />
  <text x="330" y="352" text-anchor="middle" class="label">cancel() 가능</text>

  <path class="arrowCancel" d="M660 320 L660 360 L660 390" />
  <text x="712" y="352" class="label">cancel() 가능</text>

  <text x="930" y="402" class="note">PaymentFailed / StockReservationFailed</text>
  <text x="930" y="432" class="label">• 주문 상태는 바꾸지 않고 history만 기록</text>
  <text x="930" y="460" class="label">• 사용자는 재결제 또는 취소를 선택</text>
  <text x="930" y="488" class="label">• PAID 이후에는 취소 불가</text>
</svg>
