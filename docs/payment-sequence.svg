<svg xmlns="http://www.w3.org/2000/svg" width="1620" height="1080" viewBox="0 0 1620 1080" role="img" aria-labelledby="title desc">
  <title id="title">주문-재고-결제 Saga 시퀀스 다이어그램</title>
  <desc id="desc">order-service, product-service, payment-service가 Kafka 기반 Saga로 상호작용하는 흐름과 성공, 재고 실패, 결제 실패, 결제 미확정 분기를 설명하는 다이어그램</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fc; }
      .lane { stroke: #cfd6e3; stroke-width: 2; stroke-dasharray: 8 8; }
      .actor { fill: #ffffff; stroke: #27496d; stroke-width: 2.5; rx: 18; ry: 18; }
      .actorKafka { fill: #fff8e8; stroke: #d6a437; stroke-width: 2.5; rx: 18; ry: 18; }
      .title { font: 700 30px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #162033; }
      .subtitle { font: 500 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #42506b; }
      .actorText { font: 700 20px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #173256; }
      .small { font: 500 15px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #4c5d79; }
      .msg { stroke: #52627a; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
      .msgKafka { stroke: #cc6b1d; stroke-width: 3; fill: none; marker-end: url(#arrowKafka); }
      .branch { fill: #ffffff; stroke: #d6d9e4; stroke-width: 2; rx: 16; ry: 16; }
      .branchTitle { font: 700 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #213251; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#52627a" />
    </marker>
    <marker id="arrowKafka" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#cc6b1d" />
    </marker>
  </defs>

  <rect class="bg" width="1620" height="1080" />
  <text x="50" y="58" class="title">주문-재고-결제 Saga 흐름</text>
  <text x="50" y="92" class="subtitle">결제 전에 재고를 먼저 예약하고, 결제 결과에 따라 재고를 확정하거나 복구한다. PG 결과가 애매하면 APPROVAL_UNKNOWN으로 남긴 뒤 reconciliation이 최종 확정한다.</text>

  <rect x="70" y="130" width="170" height="58" class="actor" />
  <text x="155" y="166" text-anchor="middle" class="actorText">사용자</text>

  <rect x="310" y="130" width="170" height="58" class="actor" />
  <text x="395" y="166" text-anchor="middle" class="actorText">Gateway</text>

  <rect x="550" y="130" width="190" height="58" class="actor" />
  <text x="645" y="166" text-anchor="middle" class="actorText">order-service</text>

  <rect x="810" y="130" width="190" height="58" class="actorKafka" />
  <text x="905" y="166" text-anchor="middle" class="actorText">Kafka</text>

  <rect x="1070" y="130" width="190" height="58" class="actor" />
  <text x="1165" y="166" text-anchor="middle" class="actorText">product-service</text>

  <rect x="1330" y="130" width="190" height="58" class="actor" />
  <text x="1425" y="166" text-anchor="middle" class="actorText">payment-service</text>

  <line x1="155" y1="188" x2="155" y2="840" class="lane" />
  <line x1="395" y1="188" x2="395" y2="840" class="lane" />
  <line x1="645" y1="188" x2="645" y2="840" class="lane" />
  <line x1="905" y1="188" x2="905" y2="840" class="lane" />
  <line x1="1165" y1="188" x2="1165" y2="840" class="lane" />
  <line x1="1425" y1="188" x2="1425" y2="840" class="lane" />

  <path class="msg" d="M155 230 L395 230" />
  <text x="172" y="218" class="small">1. POST /api/orders/{id}/pay</text>

  <path class="msg" d="M395 280 L645 280" />
  <text x="418" y="268" class="small">2. payOrder()</text>

  <path class="msgKafka" d="M645 330 L905 330" />
  <text x="668" y="318" class="small">3. StockReservationRequested 발행</text>

  <path class="msgKafka" d="M905 380 L1165 380" />
  <text x="928" y="368" class="small">4. product가 예약 요청 이벤트 수신</text>

  <path class="msg" d="M1165 430 L1165 490" />
  <text x="1184" y="458" class="small">5. 재고 감소 + reservation 저장</text>

  <path class="msgKafka" d="M1165 540 L905 540" />
  <text x="925" y="528" class="small">6. StockReserved 또는 StockReservationFailed</text>

  <path class="msgKafka" d="M905 590 L1425 590" />
  <text x="1020" y="578" class="small">7. payment가 StockReserved를 수신한 경우에만 진행</text>

  <path class="msg" d="M1425 640 L1425 700" />
  <text x="1190" y="668" class="small">8. REQUESTED 저장 후 PG 호출</text>

  <path class="msgKafka" d="M1425 750 L905 750" />
  <text x="1080" y="738" class="small">9. PaymentApproved 또는 PaymentFailed 발행</text>

  <path class="msgKafka" d="M905 800 L645 800" />
  <text x="704" y="788" class="small">10. order가 결과 이벤트 수신</text>

  <path class="msgKafka" d="M905 830 L1165 830" />
  <text x="950" y="818" class="small">11. product가 결과 이벤트 수신</text>

  <rect x="20" y="890" width="520" height="150" class="branch" />
  <text x="280" y="922" text-anchor="middle" class="branchTitle">성공 흐름</text>
  <text x="280" y="950" text-anchor="middle" class="small">• order: CREATED → PENDING_PAYMENT → PAID</text>
  <text x="280" y="978" text-anchor="middle" class="small">• product: stock_reservation = CONFIRMED, 재고 감소 유지</text>
  <text x="280" y="1006" text-anchor="middle" class="small">• payment: REQUESTED → APPROVED</text>

  <rect x="550" y="890" width="520" height="150" class="branch" />
  <text x="810" y="922" text-anchor="middle" class="branchTitle">재고 예약 실패</text>
  <text x="810" y="950" text-anchor="middle" class="small">• product가 StockReservationFailed를 발행</text>
  <text x="810" y="978" text-anchor="middle" class="small">• order는 PENDING_PAYMENT 유지, history만 기록</text>
  <text x="810" y="1006" text-anchor="middle" class="small">• payment는 호출되지 않음</text>

  <rect x="1080" y="890" width="520" height="150" class="branch" />
  <text x="1340" y="922" text-anchor="middle" class="branchTitle">결제 실패 / 결제 미확정</text>
  <text x="1340" y="950" text-anchor="middle" class="small">• 명시 실패: PaymentFailed → product가 예약 해제 + 재고 복구</text>
  <text x="1340" y="978" text-anchor="middle" class="small">• 미확정: APPROVAL_UNKNOWN 저장, 원본 이벤트는 processed 처리</text>
  <text x="1340" y="1006" text-anchor="middle" class="small">• reconciliation이 APPROVED 또는 FAILED로 최종 확정</text>
</svg>
