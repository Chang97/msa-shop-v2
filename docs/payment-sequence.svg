<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="1100" viewBox="0 0 1640 1100" role="img" aria-labelledby="title desc">
  <title id="title">주문-재고-결제 Saga 시퀀스</title>
  <desc id="desc">현재 구현 기준으로 order-service, product-service, payment-service가 Kafka Saga로 상호작용하는 흐름을 설명하는 다이어그램</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fc; }
      .lane { stroke: #cfd6e3; stroke-width: 2; stroke-dasharray: 8 8; }
      .actor { fill: #ffffff; stroke: #27496d; stroke-width: 2.5; rx: 18; ry: 18; }
      .actorKafka { fill: #fff8e8; stroke: #d6a437; stroke-width: 2.5; rx: 18; ry: 18; }
      .title { font: 700 30px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #162033; }
      .subtitle { font: 500 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #42506b; }
      .actorText { font: 700 20px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #173256; }
      .small { font: 500 15px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #4c5d79; }
      .msg { stroke: #52627a; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
      .msgKafka { stroke: #cc6b1d; stroke-width: 3; fill: none; marker-end: url(#arrowKafka); }
      .branch { fill: #ffffff; stroke: #d6d9e4; stroke-width: 2; rx: 16; ry: 16; }
      .branchTitle { font: 700 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #213251; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#52627a" />
    </marker>
    <marker id="arrowKafka" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#cc6b1d" />
    </marker>
  </defs>

  <rect class="bg" width="1640" height="1100" />
  <text x="50" y="58" class="title">주문-재고-결제 Saga 흐름</text>
  <text x="50" y="92" class="subtitle">결제 시작은 order-service에서 시작하고, product-service가 먼저 재고를 예약한 뒤 payment-service가 결제를 진행한다.</text>
  <text x="50" y="120" class="subtitle">결제 실패나 재고 예약 실패는 order 상태를 PAYMENT_FAILED로 반영하고, PG 결과가 불명확하면 APPROVAL_UNKNOWN과 reconciliation으로 후처리한다.</text>

  <rect x="70" y="160" width="170" height="58" class="actor" />
  <text x="155" y="196" text-anchor="middle" class="actorText">사용자</text>

  <rect x="310" y="160" width="170" height="58" class="actor" />
  <text x="395" y="196" text-anchor="middle" class="actorText">Gateway</text>

  <rect x="550" y="160" width="190" height="58" class="actor" />
  <text x="645" y="196" text-anchor="middle" class="actorText">order-service</text>

  <rect x="810" y="160" width="190" height="58" class="actorKafka" />
  <text x="905" y="196" text-anchor="middle" class="actorText">Kafka</text>

  <rect x="1070" y="160" width="190" height="58" class="actor" />
  <text x="1165" y="196" text-anchor="middle" class="actorText">product-service</text>

  <rect x="1330" y="160" width="190" height="58" class="actor" />
  <text x="1425" y="196" text-anchor="middle" class="actorText">payment-service</text>

  <line x1="155" y1="218" x2="155" y2="840" class="lane" />
  <line x1="395" y1="218" x2="395" y2="840" class="lane" />
  <line x1="645" y1="218" x2="645" y2="840" class="lane" />
  <line x1="905" y1="218" x2="905" y2="840" class="lane" />
  <line x1="1165" y1="218" x2="1165" y2="840" class="lane" />
  <line x1="1425" y1="218" x2="1425" y2="840" class="lane" />

  <path class="msg" d="M155 260 L395 260" />
  <text x="176" y="248" class="small">1. POST /api/orders/{id}/pay</text>

  <path class="msg" d="M395 310 L645 310" />
  <text x="435" y="298" class="small">2. payOrder()</text>

  <path class="msgKafka" d="M645 360 L905 360" />
  <text x="670" y="348" class="small">3. STOCK_RESERVATION_REQUESTED 발행</text>

  <path class="msgKafka" d="M905 410 L1165 410" />
  <text x="930" y="398" class="small">4. product가 재고 예약 요청 수신</text>

  <path class="msg" d="M1165 460 L1165 520" />
  <text x="1185" y="488" class="small">5. 재고 예약 또는 실패 판단</text>

  <path class="msgKafka" d="M1165 570 L905 570" />
  <text x="930" y="558" class="small">6. STOCK_RESERVED 또는 STOCK_RESERVATION_FAILED 발행</text>

  <path class="msgKafka" d="M905 620 L1425 620" />
  <text x="1035" y="608" class="small">7. payment는 STOCK_RESERVED일 때만 결제 진행</text>

  <path class="msg" d="M1425 670 L1425 730" />
  <text x="840" y="698" class="small">8. REQUESTED 저장 후 PG 호출, APPROVED / FAILED / APPROVAL_UNKNOWN 판단</text>

  <path class="msgKafka" d="M1425 780 L905 780" />
  <text x="1090" y="768" class="small">9. 확정 시 PAYMENT_APPROVED 또는 PAYMENT_FAILED 발행</text>

  <path class="msgKafka" d="M905 830 L645 830" />
  <text x="710" y="818" class="small">10. order가 같은 결과 이벤트를 소비해 PAID 또는 PAYMENT_FAILED로 반영</text>

  <path class="msgKafka" d="M905 860 L1165 860" />
  <text x="955" y="848" class="small">10. product가 같은 결과 이벤트를 소비해 CONFIRMED 또는 RELEASED 처리</text>

  <rect x="20" y="900" width="500" height="160" class="branch" />
  <text x="270" y="934" text-anchor="middle" class="branchTitle">정상 승인 흐름</text>
  <text x="270" y="966" text-anchor="middle" class="small">order: CREATED → PENDING_PAYMENT → PAID</text>
  <text x="270" y="994" text-anchor="middle" class="small">product: RESERVED → CONFIRMED</text>
  <text x="270" y="1022" text-anchor="middle" class="small">payment: REQUESTED → APPROVED</text>

  <rect x="570" y="900" width="500" height="160" class="branch" />
  <text x="820" y="934" text-anchor="middle" class="branchTitle">재고 예약 실패 / 결제 실패</text>
  <text x="820" y="966" text-anchor="middle" class="small">재고 예약 실패: payment 호출 없음, order → PAYMENT_FAILED</text>
  <text x="820" y="994" text-anchor="middle" class="small">결제 실패: order → PAYMENT_FAILED, product → RELEASED</text>
  <text x="820" y="1022" text-anchor="middle" class="small">이후 사용자는 재결제 또는 취소 가능</text>

  <rect x="1120" y="900" width="500" height="160" class="branch" />
  <text x="1370" y="934" text-anchor="middle" class="branchTitle">결제 결과 불명확</text>
  <text x="1370" y="966" text-anchor="middle" class="small">payment → APPROVAL_UNKNOWN, 현재 메시지는 markProcessed</text>
  <text x="1370" y="994" text-anchor="middle" class="small">reconciliation이 APPROVED 또는 FAILED로 최종 확정</text>
  <text x="1370" y="1022" text-anchor="middle" class="small">이후 order와 product가 최종 상태 반영</text>
</svg>
