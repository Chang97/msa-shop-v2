<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="1040" viewBox="0 0 1660 1040" role="img" aria-labelledby="title desc">
  <title id="title">MSA Shop v2 시스템 다이어그램</title>
  <desc id="desc">Gateway, Auth, User, Product, Order, Payment 서비스와 Kafka, Redis, 각 서비스 데이터베이스의 관계를 설명하는 다이어그램</desc>
  <defs>
    <style>
      .bg { fill: #f6f7fb; }
      .gateway { fill: #0f4c81; stroke: #0b3557; stroke-width: 2.5; rx: 20; ry: 20; }
      .service { fill: #ffffff; stroke: #2c4f7c; stroke-width: 2.5; rx: 18; ry: 18; }
      .serviceAlt { fill: #f8fbff; stroke: #2c4f7c; stroke-width: 2.5; rx: 18; ry: 18; }
      .infra { fill: #fff8e8; stroke: #d6a437; stroke-width: 2.5; rx: 18; ry: 18; }
      .db { fill: #edf6ee; stroke: #4f8a5b; stroke-width: 2.5; rx: 16; ry: 16; }
      .title { font: 700 30px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #162033; }
      .subtitle { font: 500 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #3f4e69; }
      .gatewayTitle { font: 700 26px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #ffffff; }
      .gatewayBody { font: 500 15px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #e4f1ff; }
      .serviceTitle { font: 700 23px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #173256; }
      .body { font: 500 16px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #33415c; }
      .dbTitle { font: 700 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #275234; }
      .dbText { font: 500 14px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #3f6547; }
      .infraTitle { font: 700 24px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #7a430c; }
      .infraBody { font: 500 15px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #895626; }
      .line { stroke: #58677e; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .lineKafka { stroke: #cc6b1d; stroke-width: 3; fill: none; }
      .lineDb { stroke: #58677e; stroke-width: 2.5; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
      .lineDbPlain { stroke: #58677e; stroke-width: 2.5; fill: none; stroke-dasharray: 8 7; }
      .legendText { font: 600 14px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #7a430c; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#58677e" />
    </marker>
  </defs>

  <rect class="bg" width="1660" height="1040" />
  <text x="56" y="60" class="title">MSA Shop v2 시스템 구조</text>
  <text x="56" y="95" class="subtitle">Gateway가 인증과 라우팅을 담당하고, 각 서비스는 자신의 DB를 소유한다. 서비스 간 긴 흐름은 Kafka Saga로 연결한다.</text>

  <rect x="670" y="130" width="320" height="110" class="gateway" />
  <text x="830" y="176" text-anchor="middle" class="gatewayTitle">gateway</text>
  <text x="830" y="204" text-anchor="middle" class="gatewayBody">JWT 검증 / 내부 헤더 전파</text>
  <text x="830" y="226" text-anchor="middle" class="gatewayBody">Redis rate limit / traceId / CORS</text>

  <rect x="80" y="320" width="260" height="170" class="service" />
  <text x="210" y="362" text-anchor="middle" class="serviceTitle">auth-service</text>
  <text x="210" y="396" text-anchor="middle" class="body">로그인 / 토큰 발급 / 로그아웃</text>
  <text x="210" y="424" text-anchor="middle" class="body">권한 정보 소유</text>
  <text x="210" y="452" text-anchor="middle" class="body">Redis 로그인 잠금</text>

  <rect x="390" y="320" width="260" height="170" class="serviceAlt" />
  <text x="520" y="362" text-anchor="middle" class="serviceTitle">user-service</text>
  <text x="520" y="396" text-anchor="middle" class="body">사용자 프로필 조회 / 수정</text>
  <text x="520" y="424" text-anchor="middle" class="body">비활성화 / 회원가입 Saga</text>
  <text x="520" y="452" text-anchor="middle" class="body">auth-service와 이벤트 연동</text>

  <rect x="700" y="320" width="260" height="170" class="service" />
  <text x="830" y="362" text-anchor="middle" class="serviceTitle">product-service</text>
  <text x="830" y="396" text-anchor="middle" class="body">상품 / 재고 정보 소유</text>
  <text x="830" y="424" text-anchor="middle" class="body">재고 예약 / 확정 / 해제</text>
  <text x="830" y="452" text-anchor="middle" class="body">예약 만료 스케줄러</text>

  <rect x="1010" y="320" width="260" height="170" class="serviceAlt" />
  <text x="1140" y="362" text-anchor="middle" class="serviceTitle">order-service</text>
  <text x="1140" y="396" text-anchor="middle" class="body">주문 생성 / 조회 / 취소</text>
  <text x="1140" y="424" text-anchor="middle" class="body">결제 시작과 상태 반영</text>
  <text x="1140" y="452" text-anchor="middle" class="body">결제 만료 스케줄러</text>

  <rect x="1320" y="320" width="260" height="170" class="service" />
  <text x="1450" y="362" text-anchor="middle" class="serviceTitle">payment-service</text>
  <text x="1450" y="396" text-anchor="middle" class="body">PG 호출과 결제 상태 관리</text>
  <text x="1450" y="424" text-anchor="middle" class="body">APPROVAL_UNKNOWN 처리</text>
  <text x="1450" y="452" text-anchor="middle" class="body">reconciliation 스케줄러</text>

  <rect x="370" y="570" width="880" height="140" class="infra" />
  <text x="810" y="615" text-anchor="middle" class="infraTitle">Kafka</text>
  <text x="810" y="646" text-anchor="middle" class="infraBody">auth.user.saga.v1 / order.payment.saga.v1 / DLQ</text>
  <text x="810" y="674" text-anchor="middle" class="infraBody">Outbox relay / processed_event claim / poison message 분기</text>
  <text x="810" y="700" text-anchor="middle" class="legendText">주황색 선: Kafka publish / consume 이벤트 채널</text>

  <rect x="380" y="130" width="220" height="110" class="infra" />
  <text x="490" y="176" text-anchor="middle" class="infraTitle">Redis</text>
  <text x="490" y="204" text-anchor="middle" class="infraBody">gateway rate limit</text>
  <text x="490" y="226" text-anchor="middle" class="infraBody">auth 로그인 잠금</text>

  <rect x="80" y="840" width="240" height="100" class="db" />
  <text x="200" y="881" text-anchor="middle" class="dbTitle">auth_db</text>
  <text x="200" y="907" text-anchor="middle" class="dbText">auth_user_credential / role</text>
  <text x="200" y="927" text-anchor="middle" class="dbText">outbox_event / processed_event</text>

  <rect x="390" y="840" width="240" height="100" class="db" />
  <text x="510" y="881" text-anchor="middle" class="dbTitle">user_db</text>
  <text x="510" y="907" text-anchor="middle" class="dbText">user_profile</text>
  <text x="510" y="927" text-anchor="middle" class="dbText">outbox_event / processed_event</text>

  <rect x="700" y="840" width="240" height="100" class="db" />
  <text x="820" y="881" text-anchor="middle" class="dbTitle">product_db</text>
  <text x="820" y="907" text-anchor="middle" class="dbText">product / stock_reservation</text>
  <text x="820" y="927" text-anchor="middle" class="dbText">outbox_event / processed_event</text>

  <rect x="1010" y="840" width="240" height="100" class="db" />
  <text x="1130" y="881" text-anchor="middle" class="dbTitle">order_db</text>
  <text x="1130" y="907" text-anchor="middle" class="dbText">orders / order_status_history</text>
  <text x="1130" y="927" text-anchor="middle" class="dbText">outbox_event / processed_event</text>

  <rect x="1320" y="840" width="240" height="100" class="db" />
  <text x="1440" y="881" text-anchor="middle" class="dbTitle">payment_db</text>
  <text x="1440" y="907" text-anchor="middle" class="dbText">payment_transaction</text>
  <text x="1440" y="927" text-anchor="middle" class="dbText">outbox_event / processed_event</text>

  <path class="line" d="M740 240 L210 320" />
  <path class="line" d="M780 240 L520 320" />
  <path class="line" d="M820 240 L830 320" />
  <path class="line" d="M860 240 L1140 320" />
  <path class="line" d="M900 240 L1450 320" />

  <path class="lineKafka" d="M210 490 L210 630 L370 630" />
  <path class="lineKafka" d="M520 490 L520 570" />
  <path class="lineKafka" d="M830 490 L830 570" />
  <path class="lineKafka" d="M1140 490 L1140 570" />
  <path class="lineKafka" d="M1450 490 L1450 630 L1250 630" />

  <path class="line" d="M670 185 L600 185" />
  <path class="line" d="M210 320 L210 270 L490 270 L490 240" />

  <path class="lineDb" d="M200 490 L200 840" />
  <path class="lineDbPlain" d="M510 490 L510 570" />
  <path class="lineDb" d="M510 710 L510 840" />
  <path class="lineDbPlain" d="M820 490 L820 570" />
  <path class="lineDb" d="M820 710 L820 840" />
  <path class="lineDbPlain" d="M1130 490 L1130 570" />
  <path class="lineDb" d="M1130 710 L1130 840" />
  <path class="lineDb" d="M1440 490 L1440 840" />
</svg>
