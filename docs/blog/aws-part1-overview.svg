<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1080" viewBox="0 0 1680 1080" role="img" aria-labelledby="title desc">
  <title id="title">MSA Shop AWS 배포 구조</title>
  <desc id="desc">요청 경로, ECS 클러스터, NAT 아웃바운드 경로와 RDS, Kafka, Redis, ECR, CloudWatch Logs 의존성을 단순화해 표현한 AWS 배포 구조도.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fc; }
      .title { font: 700 30px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #162033; }
      .sub { font: 500 16px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #51607a; }
      .label { font: 700 18px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #2d3950; }
      .text { font: 500 14px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #3c4961; }
      .textLight { font: 500 14px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #dbeeff; }
      .note { font: 500 13px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #5d6c84; }
      .outer { fill: #ffffff; stroke: #d7deea; stroke-width: 2; rx: 26; ry: 26; }
      .public { fill: #eef6ff; stroke: #4e84c1; stroke-width: 2.2; rx: 18; ry: 18; }
      .privateApp { fill: #f8fbff; stroke: #5b769c; stroke-width: 2.2; rx: 18; ry: 18; }
      .privateData { fill: #eef8f0; stroke: #5f8f69; stroke-width: 2.2; rx: 18; ry: 18; }
      .cluster { fill: #ffffff; stroke: #7c93b5; stroke-width: 2.2; rx: 18; ry: 18; }
      .gateway { fill: #0f4c81; stroke: #0b3557; stroke-width: 2.2; rx: 16; ry: 16; }
      .service { fill: #ffffff; stroke: #2d507b; stroke-width: 2.2; rx: 16; ry: 16; }
      .infra { fill: #fff8e7; stroke: #d09a2e; stroke-width: 2.2; rx: 16; ry: 16; }
      .aws { fill: #fff4ea; stroke: #d57d31; stroke-width: 2.2; rx: 16; ry: 16; }
      .db { fill: #eef8f0; stroke: #5f8f69; stroke-width: 2.2; rx: 16; ry: 16; }
      .tDark { font: 700 21px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #173256; }
      .tLight { font: 700 21px 'Pretendard', 'Noto Sans KR', sans-serif; fill: #ffffff; }
      .line { stroke: #5b6c83; stroke-width: 2.6; fill: none; marker-end: url(#arrow); }
      .lineDashed { stroke: #5b6c83; stroke-width: 2.4; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .lineOrange { stroke: #d57d31; stroke-width: 2.4; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowOrange); }
      .lineGreen { stroke: #5f8f69; stroke-width: 2.4; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5b6c83" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d57d31" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#5f8f69" />
    </marker>
  </defs>

  <rect width="1680" height="1080" class="bg" />
  <text x="48" y="54" class="title">MSA Shop AWS 배포 구조</text>
  <text x="48" y="84" class="sub">요청 경로, NAT 아웃바운드, ECS 내부 통신, 주요 의존성을 역할 기준으로 나눠 표현했다.</text>

  <rect x="70" y="120" width="220" height="92" class="aws" />
  <text x="180" y="158" text-anchor="middle" class="tDark">사용자 / 클라이언트</text>
  <text x="180" y="185" text-anchor="middle" class="text">브라우저 / API 호출 주체</text>

  <rect x="1320" y="92" width="280" height="92" class="aws" />
  <text x="1460" y="130" text-anchor="middle" class="tDark">ECR</text>
  <text x="1460" y="157" text-anchor="middle" class="text">컨테이너 이미지 저장소</text>

  <rect x="1320" y="206" width="280" height="92" class="aws" />
  <text x="1460" y="244" text-anchor="middle" class="tDark">CloudWatch Logs</text>
  <text x="1460" y="271" text-anchor="middle" class="text">ECS 태스크 로그 저장 대상</text>

  <rect x="36" y="248" width="1240" height="780" class="outer" />
  <text x="70" y="286" class="label">VPC: msa-shop-vpc (10.0.0.0/16)</text>

  <rect x="72" y="330" width="1168" height="164" class="public" />
  <text x="104" y="364" class="label">Public subnet</text>

  <rect x="112" y="390" width="210" height="82" class="gateway" />
  <text x="217" y="425" text-anchor="middle" class="tLight">ALB</text>
  <text x="217" y="449" text-anchor="middle" class="textLight">외부 요청 진입점</text>

  <rect x="388" y="390" width="190" height="82" class="infra" />
  <text x="483" y="425" text-anchor="middle" class="tDark">NAT Gateway</text>
  <text x="483" y="449" text-anchor="middle" class="text">Private ECS 아웃바운드</text>

  <rect x="872" y="390" width="150" height="82" class="infra" />
  <text x="947" y="425" text-anchor="middle" class="tDark">Kafka EC2</text>
  <text x="947" y="449" text-anchor="middle" class="text">:9092</text>

  <rect x="1050" y="390" width="150" height="82" class="infra" />
  <text x="1125" y="425" text-anchor="middle" class="tDark">Redis EC2</text>
  <text x="1125" y="449" text-anchor="middle" class="text">:6379</text>

  <rect x="72" y="528" width="1168" height="330" class="privateApp" />
  <text x="104" y="562" class="label">Private app subnet</text>

  <rect x="112" y="602" width="1088" height="220" class="cluster" />
  <text x="144" y="636" class="label">ECS Cluster</text>

  <rect x="150" y="690" width="150" height="72" class="gateway" />
  <text x="225" y="733" text-anchor="middle" class="tLight">gateway</text>

  <rect x="348" y="650" width="150" height="72" class="service" />
  <text x="423" y="693" text-anchor="middle" class="tDark">auth</text>

  <rect x="348" y="744" width="150" height="72" class="service" />
  <text x="423" y="787" text-anchor="middle" class="tDark">user</text>

  <rect x="544" y="650" width="170" height="72" class="service" />
  <text x="629" y="693" text-anchor="middle" class="tDark">product</text>

  <rect x="544" y="744" width="170" height="72" class="service" />
  <text x="629" y="787" text-anchor="middle" class="tDark">order</text>

  <rect x="760" y="698" width="170" height="72" class="service" />
  <text x="845" y="741" text-anchor="middle" class="tDark">payment</text>

  <rect x="948" y="652" width="220" height="116" class="infra" />
  <text x="1058" y="696" text-anchor="middle" class="tDark">Service Connect</text>
  <text x="1058" y="723" text-anchor="middle" class="text">ECS 내부 서비스 간</text>
  <text x="1058" y="745" text-anchor="middle" class="text">이름 기반 통신</text>

  <rect x="72" y="892" width="1168" height="96" class="privateData" />
  <text x="104" y="916" class="label">Private data subnet</text>

  <rect x="152" y="926" width="760" height="42" class="db" />
  <text x="532" y="954" text-anchor="middle" class="text">RDS PostgreSQL: auth_db / user_db / product_db / order_db / payment_db</text>

  <path class="line" d="M70 166 L40 166 L40 431 L112 431" />
  <path class="line" d="M322 431 L340 431 L340 726 L300 726" />

  <path class="lineOrange" d="M600 600 L600 431 L578 431" />
  <path class="lineOrange" d="M578 431 L1320 138" />
  <path class="lineOrange" d="M578 431 L1320 252" />

  <path class="lineDashed" d="M947 602 L947 472" />
  <path class="lineDashed" d="M1125 602 L1125 472" />
  <path class="lineGreen" d="M656 816 L656 926" />

  <text x="618" y="520" class="note">ECS 아웃바운드는 NAT를 경유</text>
  <text x="735" y="570" class="note">Kafka는 ECS 서비스가 publish / consume</text>
  <text x="1005" y="570" class="note">Redis는 일부 서비스만 사용</text>
  <text x="676" y="908" class="note">각 서비스가 자신의 DB에 접근</text>

  <text x="48" y="1044" class="sub">ALB는 gateway로만 요청을 전달한다. NAT는 private ECS 태스크가 ECR, CloudWatch Logs로 아웃바운드 접근할 때만 사용된다. Service Connect는 외부 리소스가 아니라 ECS 내부 기능이다.</text>
</svg>
