services:
  postgres:
    image: postgres:16
    container_name: msashop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    volumes:
      - msashop_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: msashop-redis
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:latest
    container_name: msashop-kafka
    hostname: kafka
    ports:
      - "19092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:19092,CONTROLLER://:19093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

  gateway:
    build:
      context: ..
      dockerfile: docker/spring-service.Dockerfile
      args:
        MODULE: :gateway
        MODULE_DIR: services/gateway
    container_name: msashop-gateway
    environment:
      SPRING_PROFILES_ACTIVE: local
      FRONTEND_ORIGIN: http://localhost:5173
      AUTH_SERVICE_URI: http://auth-service:8081
      PRODUCT_SERVICE_URI: http://product-service:8082
      ORDER_SERVICE_URI: http://order-service:8083
      PAYMENT_SERVICE_URI: http://payment-service:8084
      USER_SERVICE_URI: http://user-service:8085
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    build:
      context: ..
      dockerfile: docker/spring-service.Dockerfile
      args:
        MODULE: :auth-service
        MODULE_DIR: services/auth-service
    container_name: msashop-auth-service
    environment:
      SPRING_PROFILES_ACTIVE: local,saga-e2e
      INTERNAL_SERVICE_SECRET: local-internal-secret
      USER_SERVICE_BASE_URL: http://user-service:8085
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      AUTH_DB_URL: jdbc:postgresql://postgres:5432/auth_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  product-service:
    build:
      context: ..
      dockerfile: docker/spring-service.Dockerfile
      args:
        MODULE: :product-service
        MODULE_DIR: services/product-service
    container_name: msashop-product-service
    environment:
      SPRING_PROFILES_ACTIVE: local,saga-e2e
      INTERNAL_SERVICE_SECRET: local-internal-secret
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PRODUCT_DB_URL: jdbc:postgresql://postgres:5432/product_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  order-service:
    build:
      context: ..
      dockerfile: docker/spring-service.Dockerfile
      args:
        MODULE: :order-service
        MODULE_DIR: services/order-service
    container_name: msashop-order-service
    environment:
      SPRING_PROFILES_ACTIVE: local,saga-e2e
      INTERNAL_SERVICE_SECRET: local-internal-secret
      PRODUCT_BASE_URL: http://product-service:8082/internal/products
      PAYMENT_BASE_URL: http://payment-service:8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ORDER_DB_URL: jdbc:postgresql://postgres:5432/order_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  payment-service:
    build:
      context: ..
      dockerfile: docker/spring-service.Dockerfile
      args:
        MODULE: :payment-service
        MODULE_DIR: services/payment-service
    container_name: msashop-payment-service
    environment:
      SPRING_PROFILES_ACTIVE: local,saga-e2e
      INTERNAL_SERVICE_SECRET: local-internal-secret
      ORDER_BASE_URL: http://order-service:8083
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PAYMENT_DB_URL: jdbc:postgresql://postgres:5432/payment_db
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  user-service:
    build:
      context: ..
      dockerfile: docker/spring-service.Dockerfile
      args:
        MODULE: :user-service
        MODULE_DIR: services/user-service
    container_name: msashop-user-service
    environment:
      SPRING_PROFILES_ACTIVE: local,saga-e2e
      INTERNAL_SERVICE_SECRET: local-internal-secret
      AUTH_SERVICE_BASE_URL: http://auth-service:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      USER_DB_URL: jdbc:postgresql://postgres:5432/user_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

volumes:
  msashop_pgdata:
