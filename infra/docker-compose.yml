services:
  postgres:
    image: postgres:16
    container_name: msashop-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    volumes:
      - msashop_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro

  redis:
    image: redis:7
    container_name: msashop-redis
    ports:
      - "16379:6379"

  kafka:
    image: apache/kafka:latest
    container_name: msashop-kafka
    ports:
      - "19092:19092"
    environment:
      # 단일 브로커/컨트롤러 겸용 노드
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # 브로커/컨트롤러 리스너
      KAFKA_LISTENERS: PLAINTEXT://:19092,CONTROLLER://:19093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:19093

      # 단일 브로커 개발 환경에서 필요한 최소값
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

      # 선택: 고정 cluster id를 쓰고 싶으면 설정
#      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

volumes:
  msashop_pgdata:
